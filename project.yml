name: MDEditorKit
options:
  bundleIdPrefix: com.steveshi
targets:
  MDEditorKit:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/MDEditorKit
    settings:
      BUILD_LIBRARY_FOR_DISTRIBUTION: YES
      SKIP_INSTALL: NO
      PRODUCT_BUNDLE_IDENTIFIER: com.steveshi.MDEditorKit
      DEFINES_MODULE: YES
    dependencies:
      - package: MarkdownView
        product: MarkdownView
      - package: MarkdownView
        product: MarkdownParser
packages:
  MarkdownView:
    url: https://github.com/SteveShi/MarkdownView.git
    from: 1.0.0
